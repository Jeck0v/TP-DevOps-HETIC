---
- name: Créer le répertoire d'application
  file:
    path: /opt/app
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copier le fichier de configuration
  copy:
    content: |
      # Configuration de l'application
      APP_ENV={{ app_env }}
      APP_LOG_LEVEL={{ app_log_level }}
      APP_PORT={{ app_port }}
    dest: /opt/app/.env
    mode: '0600'
